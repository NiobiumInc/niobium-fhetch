name: Dispatch to niobium-client on PR

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read

jobs:
  dispatch:
    runs-on: ubuntu-latest

    steps:
      - name: Dispatch fhetch_pr to niobium-client
        env:
          GH_TOKEN: ${{ github.token }}
          FHETCH_SHA: ${{ github.event.pull_request.head.sha }}
          FHETCH_BRANCH: ${{ github.head_ref }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          jq -n \
            --arg sha "$FHETCH_SHA" \
            --arg branch "$FHETCH_BRANCH" \
            --argjson pr_number "$PR_NUMBER" \
            --arg pr_title "$PR_TITLE" \
            '{event_type: "fhetch_pr", client_payload: {sha: $sha, branch: $branch, pr_number: $pr_number, pr_title: $pr_title}}' \
          | gh api --method POST \
              repos/NiobiumInc/niobium-client/dispatches \
              --input -
