name: Dispatch to niobium-client on PR

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read

jobs:
  dispatch:
    runs-on: ubuntu-latest

    steps:
      - name: Generate token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}

      - name: Dispatch fhetch_pr to niobium-client
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          FHETCH_SHA: ${{ github.event.pull_request.head.sha }}
          FHETCH_BRANCH: ${{ github.head_ref }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          jq -n \
            --arg sha "$FHETCH_SHA" \
            --arg branch "$FHETCH_BRANCH" \
            --argjson pr_number "$PR_NUMBER" \
            --arg pr_title "$PR_TITLE" \
            '{event_type: "fhetch_pr", client_payload: {sha: $sha, branch: $branch, pr_number: $pr_number, pr_title: $pr_title}}' \
          | gh api --method POST \
              repos/NiobiumInc/niobium-client/dispatches \
              --input -
